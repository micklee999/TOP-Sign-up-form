<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='sign-up-form.css'>
    <title>Document</title>
</head>

<body>
    <div class='left'>
        <div class='odin'><img src='odin-lined.png'>Odin</div>
        <div class='credits'>Photo by <u>Halie West</u> on <u>Unsplash</u></div>
    </div>
    <div class='right'>
        <div><span class='text'><strong>This is not a real online service! You know you need something like this in your
                    life to help you
                    realize your deepest dreams. Sign up <i>now</i> to get started

                    <p>You <i>know</i> you want to</p>
                </strong></span>
        </div>
        <div class='form-area'>
            <span class='form-header'>Let's do this!</span>
            <form id='sign-up-form'>
                <section class='name'>
                    <div class='form-field'>
                        <label for='first-name'>FIRST NAME</label>
                        <input type='text' id='first-name'>
                    </div>

                    <div class='form-field'>
                        <label for='last-name'>LAST NAME</label>
                        <input type='text' id='last-name'>
                    </div>
                </section>

                <section class='contact'>
                    <div class='form-field'>
                        <label for='email'>EMAIL</label>
                        <input type='email' id='email'>
                    </div>

                    <div class='form-field'>
                        <label for='phone-number'>PHONE NUMBER</label>
                        <input type='tel' id='phone-number'>
                    </div>
                </section>

                <section class='password'>
                    <div class='form-field'>
                        <label for='password'>PASSWORD</label>
                        <input type='text' id='password'>
                    </div>

                    <div class='form-field'>
                        <label for='confirm-password'>CONFIRM PASSWORD</label>
                        <input type='text' id='confirm-password'>
                    </div>
                </section>
            </form>
        </div>
        <button type='submit' for='sign-up-form'>Create Account</button>
        <p class='last-line'>Already have an account? <span class='login'>Log in</span></p>
    </div>
</body>

</html>
